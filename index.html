// ── AUDIO ENGINE ───────────────────────────────────────────────────────────────
let audioCtx=null,audioUnlocked=false;
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
// ── TOAST NOTIFICATION ────────────────────────────────────────────────────────
let _toastTimer=null;
function showToast(msg, color="#F0F4F8", duration=2800){
  let el=document.getElementById('sound-hint');
  if(!el) return;
  if(_toastTimer) clearTimeout(_toastTimer);
  el.style.background=color==="ok"?"#00796B":color==="err"?"#B71C1C":"#1E2A35";
  el.style.color="#F0F4F8";
  el.textContent=msg;
  el.classList.add('show');
  _toastTimer=setTimeout(()=>{ el.classList.remove('show'); },duration);
}

function unlockAudio(){
  if(audioUnlocked)return;
  try{
    const ctx=getAudioCtx();
    const buf=ctx.createBuffer(1,1,22050);
    const src=ctx.createBufferSource();
    src.buffer=buf;src.connect(ctx.destination);src.start(0);
    if(ctx.state==='suspended')ctx.resume();
    audioUnlocked=true;
    document.getElementById('sound-hint').classList.remove('show');
  }catch(e){}
}
document.addEventListener('touchstart',unlockAudio,{once:true});
document.addEventListener('click',unlockAudio,{once:true});

function beep(freq,dur,vol=0.5,type='sine'){
  try{
    const ctx=getAudioCtx();
    if(ctx.state==='suspended')ctx.resume();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type=type;
    osc.frequency.setValueAtTime(freq,ctx.currentTime);
    gain.gain.setValueAtTime(vol,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime+dur+0.01);
  }catch(e){}
}
function beepTick(){beep(900,0.11,0.65,'sine');if(navigator.vibrate)navigator.vibrate(55);}
function beepEnd(){
  beep(440,0.14,0.7,'square');
  setTimeout(()=>beep(700,0.4,0.85,'sine'),160);
  if(navigator.vibrate)navigator.vibrate([120,70,280]);
}
// Beep inizio set AXE: doppio tono ascendente
function beepAxeGo(){
  beep(500,0.07,0.7,'square');
  setTimeout(()=>beep(800,0.18,0.9,'sine'),80);
  if(navigator.vibrate)navigator.vibrate([60,30,120]);
}
// Beep fine set AXE / inizio rest: tono discendente
function beepAxeRest(){
  beep(700,0.12,0.6,'sine');
  setTimeout(()=>beep(350,0.3,0.5,'sine'),130);
  if(navigator.vibrate)navigator.vibrate([40]);
}
// Beep fine sessione AXE: fanfara
function beepAxeDone(){
  beep(523,0.1,0.8,'sine');
  setTimeout(()=>beep(659,0.1,0.8,'sine'),120);
  setTimeout(()=>beep(784,0.1,0.8,'sine'),240);
  setTimeout(()=>beep(1047,0.5,0.9,'sine'),360);
  if(navigator.vibrate)navigator.vibrate([100,60,100,60,300]);
}

function buildDayA(){
  const seq=[];
  for(let r=1;r<=6;r++)["KB Swing","Push-up","Goblet Squat","Rest"].forEach(n=>seq.push({name:n,round:r,totalRounds:6,timerSec:60,type:"emom"}));
  return seq;
}
function buildDayB(){
  const seq=[];
  for(let r=1;r<=5;r++)["Clean + Press","Reverse Lunge","One Arm Swing","Plank Shoulder Tap"].forEach(n=>{
    seq.push({name:n,round:r,totalRounds:5,timerSec:40,type:"work"});
    seq.push({name:"Rest",round:r,totalRounds:5,timerSec:20,type:"rest"});
  });
  return seq;
}
function buildDayC(){
  const LADDER=[1,2,3,4,5,4,3,2,1];
  const seq=[];
  for(let c=1;c<=2;c++)LADDER.forEach(n=>{
    seq.push({name:"Clean",repsOverride:`${n} rip / lato`,round:c,totalRounds:2,timerSec:null,type:"ladder",ladderN:n});
    seq.push({name:"Front Squat",repsOverride:`${n} rip (in rack)`,round:c,totalRounds:2,timerSec:null,type:"ladder",ladderN:n});
    seq.push({name:"Push Press",repsOverride:`${n} rip → cambia lato`,round:c,totalRounds:2,timerSec:null,type:"ladder",ladderN:n});
  });
  seq.push({name:"AMRAP 6'",round:1,totalRounds:1,timerSec:360,type:"amrap",isAmrap:true});
  return seq;
}

function buildCircuitSeq(data){
  const seq=[];
  const totalRounds=data.rounds;
  for(let r=1;r<=totalRounds;r++){
    data.exercises.forEach((ex,ei)=>{
      seq.push({
        name:ex.name,
        repsOverride:ex.repsOverride||null,
        round:r,totalRounds,
        timerSec:null,   // rep-based, no timer obbligatorio
        type:"work",
      });
      // rest tra esercizi (non dopo l'ultimo esercizio del round)
      if(ei<data.exercises.length-1){
        seq.push({name:"Rest",round:r,totalRounds,timerSec:data.restBetweenEx,type:"rest",
          repsOverride:`Prossimo: ${data.exercises[ei+1].name}`});
      }
    });
    // rest tra round (non dopo l'ultimo round)
    if(r<totalRounds){
      seq.push({name:"Recupero",round:r,totalRounds,timerSec:data.restBetweenRounds,type:"rest",
        repsOverride:`Round ${r+1} di ${totalRounds} — Riposo 2 minuti`});
    }
  }
  return seq;
}

function startRingsWorkout(ph,w){
  const key=`${ph}-${w}`;
  const data=RINGS_DATA[key];
  if(!data)return;
  data.seq=buildCircuitSeq(data);
  DAYS["bw_jacked"]=data;
  // Aggiorna anche la selezione nel piano
  state.plan.ringsPhase=ph;
  state.plan.ringsWorkout=w;
  savePlan();
  startWorkout("bw_jacked");
}

function startBwCircuit(id){
  const data=BW_CIRCUITS[id];
  if(!data)return;
  data.seq=buildCircuitSeq(data);
  DAYS["bw_circuit"]=data;
  startWorkout("bw_circuit");
}

function ringHTML(total,remaining,color,countdown=false){
  const r=68,cx=80,cy=80,circ=2*Math.PI*r;
  const pct=total>0?remaining/total:1;

  const col=countdown?"#EF5350":color;
  const pulse=countdown?'class="countdown-pulse"':'';
  const sub=countdown?`<text x="${cx}" y="${cy+34}" text-anchor="middle" fill="#EF5350" font-family="'Bebas Neue',sans-serif" font-size="14" letter-spacing="3">PRONTI!</text>`:'';
  return `<svg width="160" height="160" ${pulse} style="filter:drop-shadow(0 0 18px ${col}55)">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1E2A35" stroke-width="9"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="9"
      stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${circ*0.25}"
      stroke-linecap="round" style="transition:stroke-dasharray 0.45s ease"/>
    <text x="${cx}" y="${cy+14}" text-anchor="middle" fill="${countdown?'#EF5350':'#F0F4F8'}"
      font-family="'Bebas Neue',sans-serif" font-size="40">${fmtTime(remaining)}</text>
    ${sub}
  </svg>`;
}

// ── SMART SUGGESTION ─────────────────────────────────────────────────────────
function getSmartSuggestion(){
  const hist=state.history;
  const axeHist=state.axeHistory;
  const last5=[...hist].slice(-5);
  const last3=[...hist].slice(-3);
  const lastSession=hist.length>0?hist[hist.length-1]:null;
  const lastAxe=axeHist.length>0?axeHist[axeHist.length-1]:null;

  // Ultima sessione di qualsiasi tipo (KB, EXTRA, AXE)
  const lastKBDate=lastSession?new Date(lastSession.date||0):null;
  const lastAxeDate=lastAxe?new Date(lastAxe.date||0):null;
  const lastAnyDate=lastKBDate&&lastAxeDate
    ?(lastKBDate>lastAxeDate?lastKBDate:lastAxeDate)
    :(lastKBDate||lastAxeDate||null);
  const lastAnyIsAxe=lastAxeDate&&(!lastKBDate||lastAxeDate>=lastKBDate);

  // ── 1. RECUPERO ──────────────────────────────────────────────────────────
  if(lastSession){
    const isHeavy=lastSession.feeling==="😫";
    const isHighHR=lastSession.hrAvg&&lastSession.hrAvg>165;
    if(isHeavy||isHighHR){
      return {
        type:"rest",icon:"🌀",color:"#00BFA5",
        title:"Giorno di recupero",
        reason:isHeavy
          ?`Ultima sessione (${lastSession.day}) era pesante — il corpo chiede recupero.`
          :`HR media alta (${lastSession.hrAvg} bpm) — lascia che il sistema si adatti.`,
        action:null,actionLabel:null,
        tip:"Mobilità leggera o camminata. Niente KB oggi."
      };
    }
  }

  // ── 2. AXE — suggerisci solo se axeOn è attivo ───────────────────────────
  const axeEnabled=state.plan?.axeOn!==false;
  const axeSessionsThisWeek=axeHist.filter(h=>{
    const d=new Date(h.date||0);
    const now=new Date();
    const weekAgo=new Date(now-7*24*60*60*1000);
    return d>weekAgo;
  }).length;
  const lastSessionWasAXE=lastAnyIsAxe;
  const needsAXE=axeSessionsThisWeek<2&&!lastSessionWasAXE;

  if(needsAXE&&hist.length>=1&&axeEnabled){
    const axeP=state.axeProgress;
    return {
      type:"axe",icon:"🪓",color:"#9C27B0",
      title:`AXE — ${axeP.currentSets} set × ${axeP.repsPerSet} rip`,
      reason:`Questa settimana hai fatto ${axeSessionsThisWeek}/2 sessioni AXE — costruisce il motore aerobico.`,
      action:"switchTab('train');setTimeout(()=>document.getElementById('train-axe-btn')?.click(),100)",
      actionLabel:"▶ Start AXE",
      tip:"AGT Pavel · talk test · no grinding · qualità sopra tutto"
    };
  }

  // ── 3. BELLPLEX — suggerisci se non ne hai fatto uno nelle ultime 4 sessioni
  const recentBP=last5.filter(h=>h.day&&h.day.startsWith("extra_BP"));
  const noRecentBP=recentBP.length===0&&hist.length>=3&&!lastSessionWasAXE;
  if(noRecentBP){
    const recentIds=last5.filter(h=>h.day&&h.day.startsWith("extra_BP")).map(h=>h.day.replace("extra_",""));
    const bpWorkouts=EXTRA_WORKOUTS.filter(w=>w.id.startsWith("BP"));
    const candidate=bpWorkouts.find(w=>!recentIds.includes(w.id))||bpWorkouts[0];
    return {
      type:"bellplex",icon:candidate.emoji,color:"#E53935",
      title:`Bellplex: ${candidate.label} — ${candidate.title}`,
      reason:"Non fai un Bellplex complex da un po' — ottimo per forza e condizionamento.",
      action:`openExtraDetail('${candidate.id}')`,
      actionLabel:`▶ Start ${candidate.label}`,
      tip:candidate.meta
    };
  }

  // ── 4. EXTRA generico (non-BP) se non ne ha fatto uno di recente ─────────
  const recentExtra=last5.filter(h=>h.day&&h.day.startsWith("extra_")&&!h.day.startsWith("extra_BP"));
  const noRecentExtra=recentExtra.length===0&&hist.length>=3&&!lastSessionWasAXE;
  if(noRecentExtra){
    const recentIds=last5.filter(h=>h.day&&h.day.startsWith("extra_")).map(h=>h.day.replace("extra_",""));
    const nonBP=EXTRA_WORKOUTS.filter(w=>!w.id.startsWith("BP"));
    const candidate=nonBP.find(w=>!recentIds.includes(w.id))||nonBP[0];
    return {
      type:"extra",icon:candidate.emoji,color:candidate.color,
      title:`${candidate.label} — ${candidate.title}`,
      reason:"Varietà — prova un workout EXTRA che non fai da un po'.",
      action:`openExtraDetail('${candidate.id}')`,
      actionLabel:`▶ Apri ${candidate.label}`,
      tip:candidate.meta
    };
  }

  // ── 5. EQUILIBRIO A/B/C ──────────────────────────────────────────────────
  const lastDay=lastSession?lastSession.day:null;
  const abcCount={A:0,B:0,C:0};
  [...hist].slice(-6).forEach(h=>{
    if(["A","B","C"].includes(h.day)) abcCount[h.day]++;
  });
  const abcOrder=["A","B","C"].filter(d=>d!==lastDay).sort((a,b)=>abcCount[a]-abcCount[b]);
  const suggestedABC=abcOrder[0]||"A";
  const suggestedDay=DAYS[suggestedABC];

  // Progressione volume
  const lastTwo=last3.slice(-2);
  const allEasy=lastTwo.length>=2&&lastTwo.every(h=>h.feeling==="💪"||h.feeling==="🔥");
  if(allEasy&&lastDay){
    return {
      type:"abc",icon:suggestedDay.emoji,color:suggestedDay.color,
      title:`${suggestedDay.label} — ${suggestedDay.subtitle}`,
      reason:"Ultime 2 sessioni andate bene 💪 — sei pronto per alzare il ritmo.",
      action:`startWorkout('${suggestedABC}')`,
      actionLabel:`▶ Start ${suggestedDay.label} (max effort)`,
      tip:"Obiettivo: mantieni la tecnica anche negli ultimi round."
    };
  }

  return {
    type:"abc",icon:suggestedDay.emoji,color:suggestedDay.color,
    title:`${suggestedDay.label} — ${suggestedDay.subtitle}`,
    reason:lastDay
      ?`Ultimo: Giorno ${lastDay}. Tocca a ${suggestedABC} per l'equilibrio.`
      :"Inizia con il Giorno A — il punto di partenza.",
    action:`startWorkout('${suggestedABC}')`,
    actionLabel:`▶ Start ${suggestedDay.label}`,
    tip:`${suggestedDay.focus} · ~${suggestedDay.totalMin} min`
  };
}

// ── RENDER WORKOUT ────────────────────────────────────────────────────────────
function renderWorkout(){
  const day=DAYS[state.dayKey],seq=day.seq,step=seq[state.stepIdx];
  const ex=EXERCISES[step.name]||{};
  const isRest=step.type==="rest"||step.name==="Rest";
  const isAmrap=!!step.isAmrap;
  const hasTimer=step.timerSec!=null;
  const isLast=state.stepIdx>=seq.length-1;
  const countdown=hasTimer&&state.remaining<=3&&state.remaining>0&&state.timerRunning;
  const KPhex={A:"#ffb693",B:"#e9c176",C:"#50dad1"};
  const accentHex=isRest?"#50dad1":isAmrap?"#e9c176":(KPhex[state.dayKey]||day.color||"#ffb693");
  const repsLabel=step.repsOverride||ex.reps||"";
  const progress=Math.round(state.stepIdx/seq.length*100);

  // Ring timer SVG — grande, leggibile da terra
  let timerEl="";
  if(hasTimer){
    const r=44, circ=2*Math.PI*r;
    const pct=step.timerSec>0?state.remaining/step.timerSec:1;
    const dash=circ*pct;
    const glowColor=countdown?"#ffb4ab":accentHex;
    timerEl=`<div class="relative flex items-center justify-center" style="width:280px;height:280px">
      <div class="absolute inset-0 rounded-full pointer-events-none" style="background:radial-gradient(circle,${accentHex}0a,transparent 65%)"></div>
      <svg class="absolute inset-0 w-full h-full" style="transform:rotate(-90deg)" viewBox="0 0 100 100">
        <circle cx="50" cy="50" fill="none" r="${r}" stroke="#1C2530" stroke-width="2"/>
        <circle id="timer-arc" cx="50" cy="50" fill="none" r="${r}"
          stroke="${glowColor}" stroke-dasharray="${dash} ${circ}"
          stroke-linecap="square" stroke-width="3"
          style="transition:stroke-dasharray 0.4s ease;filter:drop-shadow(0 0 6px ${glowColor}55)"/>
      </svg>
      <div class="flex flex-col items-center text-center relative z-10">
        <span id="timer-display" class="font-headline leading-none" style="font-size:88px;color:${glowColor};line-height:1">${fmtTime(state.remaining)}</span>
        <span class="font-headline text-lg tracking-widest mt-1" style="color:${glowColor}88">${isRest?"RECUPERO":repsLabel||"SEC"}</span>
      </div>
    </div>`;
  } else {
    timerEl=`<div class="flex items-center justify-center" style="width:280px;height:280px">
      <div class="relative border-2 flex flex-col items-center justify-center" style="width:220px;height:220px;border-color:${accentHex}44;background:radial-gradient(circle,${accentHex}0a,transparent)">
        <span class="font-headline leading-none text-center px-4" style="font-size:${repsLabel.length>8?'32px':'48px'};color:${accentHex}">${repsLabel||"✋"}</span>
        <span class="font-label text-[10px] uppercase tracking-widest text-gray-600 mt-2">REPS</span>
      </div>
    </div>`;
  }

  // Prossimo esercizio
  const nextStep_=seq[state.stepIdx+1];
  const nextUpBar=(!isLast&&nextStep_)?`<div class="flex justify-between items-center px-6 py-3 border-t border-white/5" style="background:#0C1017">
    <div class="flex items-center gap-3">
      <span class="material-symbols-outlined text-gray-600 text-sm">skip_next</span>
      <span class="font-label text-[9px] uppercase font-bold tracking-widest text-gray-600">Prossimo</span>
    </div>
    <span class="font-headline text-xl tracking-wide" style="color:${accentHex}88">${nextStep_.name.toUpperCase()}</span>
  </div>`:"";

  // Cue coach
  const coachCue=ex.cue?`<div class="mx-5 mb-3 bg-surface-container p-5 border-l-2 flex items-start gap-3" style="border-color:${accentHex}">
    <span class="material-symbols-outlined text-lg flex-shrink-0 mt-0.5" style="color:${accentHex};font-variation-settings:'FILL' 1">tips_and_updates</span>
    <p class="font-body italic text-base text-on-surface leading-relaxed">"${ex.cue}"</p>
  </div>`:"";

  // Ladder pillole
  let ladderHTML="";
  if(step.type==="ladder"&&step.name==="Clean"){
    const pills=[1,2,3,4,5,4,3,2,1].map(n=>{
      const a=n===step.ladderN;
      return `<div class="w-10 h-10 flex items-center justify-center border font-headline text-xl"

  function ytId(url){if(!url)return null;const m=url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:null;}

  return `<div class="screen bg-background" style="overflow:hidden;padding-top:0">

// ── RENDER LOG ────────────────────────────────────────────────────────────────
function renderLog(){
  const logSub=state.logSub||"sessioni";
  const hist=state.history||[];
  const extHist=state.externalHistory||[];
  const axeHist=state.axeHistory||[];
  const filter=state.statsFilter||"all";

  // ── SUB-NAV ──
  const logTabs=[
    {id:"sessioni",label:"Sessioni"},
    {id:"stats",   label:"Stats"},
    {id:"salute",  label:"Salute"},
  ];
  const subNav=`<div class="flex gap-2 mb-8">
    ${logTabs.map(t=>`<button onclick="state.logSub='${t.id}';render()"
      class="flex-1 py-2.5 font-headline text-base tracking-widest uppercase active:scale-95 transition-transform"
      style="${logSub===t.id?'background:#ffb693;color:#351000':'border:1px solid rgba(90,65,54,0.4);color:#64748b;background:transparent'}">${t.label}</button>`).join("")}
  </div>`;

  // ══ SESSIONI ══
  function tabSessioni(){
    const allSessions=[
      ...hist.map(h=>({...h,_src:"kb"})),
      ...extHist.map(h=>({...h,_src:"ext"})),
    ].sort((a,b)=>{
      const p=s=>{try{const[d,m,y]=s.date.split("/").map(Number);return new Date(y,m-1,d);}catch(e){return new Date(0);}};
      return p(b)-p(a);
    });
    const visible=filter==="kb"?allSessions.filter(h=>h._src==="kb"):filter==="external"?allSessions.filter(h=>h._src==="ext"):allSessions;
    const KPhex={A:"#ffb693",B:"#e9c176",C:"#50dad1"};
    const EXT_C={"Calisthenics":"#50dad1","Corsa":"#ffb693","Yoga":"#8b5cf6","Ciclismo":"#e9c176","Nuoto":"#06b6d4","Calcio":"#22c55e","Altro":"#64748b"};

    const filterBar=`<div class="flex gap-2 mb-5">
      ${[{id:"all",l:"Tutti"},{id:"kb",l:"KB"},{id:"external",l:"Altri"}].map(f=>`<button onclick="setStatsFilter('${f.id}')"
        class="px-4 py-1.5 font-label text-[10px] font-bold tracking-widest uppercase transition-all"
        style="border-radius:2px;background:${filter===f.id?'#ffb693':'transparent'};border:1px solid ${filter===f.id?'#ffb693':'rgba(90,65,54,0.4)'};color:${filter===f.id?'#351000':'#64748b'}">${f.l}</button>`).join("")}
      <button onclick="state.showExtForm=!state.showExtForm;render()"
        class="ml-auto px-4 py-1.5 font-label text-[10px] font-bold tracking-widest uppercase transition-all"
        style="border-radius:2px;border:1px solid rgba(80,218,209,0.4);color:#50dad1;background:transparent">
        ${state.showExtForm?"✕ Chiudi":"+ Aggiungi"}
      </button>
    </div>`;

    const ef=state.logExtForm;
    const extTypes=["Calisthenics","Corsa","Yoga","Ciclismo","Nuoto","Calcio","Altro"];
    const feelOpts=[{v:"😫",l:"Pesante"},{v:"😐",l:"Normale"},{v:"💪",l:"Bene"},{v:"🔥",l:"Ottimo"}];
    const extForm=state.showExtForm?`<div class="bg-surface-container ghost-border p-5 border-l-2 border-l-tertiary mb-4 space-y-4">
      <p class="font-label text-[9px] uppercase tracking-widest text-tertiary">Tipo attività</p>
      <div class="flex flex-wrap gap-2">
        ${extTypes.map(t=>`<button onclick="setExtField('type','${t}')"
          class="px-3 py-1 font-label text-[10px] font-bold uppercase tracking-wider"
          style="border:1px solid ${ef.type===t?(EXT_C[t]||'#64748b'):'rgba(90,65,54,0.3)'};color:${ef.type===t?(EXT_C[t]||'#fff'):'#64748b'};background:${ef.type===t?((EXT_C[t]||'#64748b')+'18'):'transparent'}">${t}</button>`).join("")}
      </div>
      <div class="grid grid-cols-3 gap-3">
        <div><label class="font-label text-[8px] uppercase tracking-widest text-gray-500 block mb-1">Durata (min)</label>
        <input class="log-input w-full" type="number" placeholder="45" value="${ef.duration}" oninput="setExtField('duration',this.value)" inputmode="numeric"/></div>
        <div><label class="font-label text-[8px] uppercase tracking-widest text-gray-500 block mb-1">HR media</label>
        <input class="log-input w-full" type="number" placeholder="bpm" value="${ef.hrAvg}" oninput="setExtField('hrAvg',this.value)" inputmode="numeric"/></div>
        <div><label class="font-label text-[8px] uppercase tracking-widest text-gray-500 block mb-1">HR max</label>
        <input class="log-input w-full" type="number" placeholder="bpm" value="${ef.hrMax}" oninput="setExtField('hrMax',this.value)" inputmode="numeric"/></div>
      </div>
      <div class="grid grid-cols-4 gap-2">
        ${feelOpts.map(o=>`<button onclick="setExtField('feeling','${o.v}')"
          class="py-3 text-xl transition-all"
          style="background:${ef.feeling===o.v?'rgba(233,193,118,0.15)':'transparent'};border:1px solid ${ef.feeling===o.v?'#e9c176':'rgba(90,65,54,0.3)'}">${o.v}</button>`).join("")}
      </div>
      <div class="flex gap-3">
        <button onclick="state.showExtForm=false;render()" class="flex-1 py-3 bg-surface-container-high font-headline text-lg tracking-widest text-gray-500">ANNULLA</button>
        <button onclick="saveExternalSession()" style="flex:2;padding:12px;background:linear-gradient(135deg,#50dad1,#00aba2);color:#000;" class="font-headline text-lg tracking-widest">SALVA</button>
      </div>
    </div>`:"";

    const list=visible.length===0
      ?`<div class="flex flex-col items-center py-16 text-gray-600">
          <span class="material-symbols-outlined text-5xl mb-4">fitness_center</span>
          <p class="font-headline text-xl tracking-widest">NESSUNA SESSIONE</p>
          <p class="font-label text-sm mt-2">Inizia il primo allenamento</p>
        </div>`
      :visible.map(h=>{
        const isExt=h._src==="ext";
        const realIdx=isExt?extHist.findIndex(e=>e.date===h.date&&e.type===h.type):hist.findIndex(e=>e.date===h.date&&e.day===h.day);
        const editKey=isExt?`ext_${realIdx}`:`kb_${realIdx}`;
        const isEditing=state.editingEntry===editKey;
        const col=isExt?(EXT_C[h.type]||"#64748b"):(KPhex[h.day]||"#ffb693");
        const label=isExt?h.type:h.day&&h.day.startsWith("extra_")?h.day.replace("extra_",""):`Giorno ${h.day}`;
        const [dayN,...rest]=h.date?h.date.split("/"):["—"];
        const mo=rest.length?["","GEN","FEB","MAR","APR","MAG","GIU","LUG","AGO","SET","OTT","NOV","DIC"][Number(rest[0])]||"":"";
        const editBlock=isEditing?`<div class="mt-3 pt-3 border-t border-white/5 space-y-3">
          <div class="grid grid-cols-2 gap-3">
            <div><label class="font-label text-[8px] uppercase tracking-widest text-gray-500 block mb-1">HR Media</label>
            <input class="log-input w-full" type="number" placeholder="bpm" value="${h.hrAvg||''}" onchange="editEntryField('${editKey}','hrAvg',this.value)" inputmode="numeric"/></div>
            <div><label class="font-label text-[8px] uppercase tracking-widest text-gray-500 block mb-1">HR Max</label>
            <input class="log-input w-full" type="number" placeholder="bpm" value="${h.hrMax||''}" onchange="editEntryField('${editKey}','hrMax',this.value)" inputmode="numeric"/></div>
          </div>
          <div><label class="font-label text-[8px] uppercase tracking-widest text-gray-500 block mb-1">Note</label>
          <input class="log-input w-full" type="text" placeholder="Note..." value="${h.notes||''}" onchange="editEntryField('${editKey}','notes',this.value)"/></div>
          <button onclick="closeEdit()" class="w-full py-3 font-headline text-lg tracking-widest" style="background:linear-gradient(135deg,#50dad1,#00aba2);color:#000">✓ CHIUDI</button>
        </div>`:"";
        return `<div class="flex items-center gap-4 p-4 bg-surface-container ghost-border hover:bg-surface-container-high transition-colors group" style="border-left:2px solid ${col}">
          <div class="text-center w-9 flex-shrink-0">
            <p class="font-headline text-xl leading-none">${dayN}</p>
            <p class="font-label text-[8px] uppercase text-gray-600">${mo}</p>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-headline text-lg leading-none" style="color:${col}">${label.toUpperCase()}</p>
            <div class="flex gap-3 mt-1 flex-wrap">
              ${h.duration?`<span class="font-label text-[9px] text-gray-500 uppercase">${h.duration} min</span>`:''}
              ${h.hrAvg?`<span class="font-label text-[9px] uppercase" style="color:#ffb4ab">❤️ ${h.hrAvg}</span>`:''}
              ${h.feeling?`<span class="font-label text-[9px] text-gray-500">${h.feeling}</span>`:''}
            </div>
            ${h.notes?`<p class="font-label text-[10px] italic text-gray-600 mt-1">"${h.notes}"</p>`:''}
            ${editBlock}
          </div>
          <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">
            <button onclick="openEdit('${editKey}')" class="text-gray-600 hover:text-primary transition-colors">
              <span class="material-symbols-outlined text-base">edit</span>
            </button>
            <button onclick="deleteEntryByKey('${editKey}')" class="text-gray-600 hover:text-error transition-colors">
              <span class="material-symbols-outlined text-base">delete</span>
            </button>
          </div>
        </div>`;
      }).join("");

    return `${filterBar}${extForm}<div class="space-y-1">${list}</div>
    <!-- Backup -->
    <div class="mt-8 space-y-2">
      <p class="font-label text-[9px] uppercase tracking-[0.2em] text-gray-600 mb-3">BACKUP</p>
      ${[
        {fn:"exportJSON()",icon:"download",lbl:"Esporta JSON",c:"tertiary"},
        {fn:"exportCSV()", icon:"table_view",lbl:"Esporta CSV", c:"secondary"},
        {fn:"importJSON()",icon:"upload",   lbl:"Importa JSON",c:"primary"},
      ].map(b=>`<button onclick="${b.fn}" class="w-full bg-surface-container ghost-border p-4 flex items-center gap-3 hover:bg-surface-container-high transition-colors border-l-2" style="border-left-color:var(--tw-${b.c})||'#ffb693'">
        <span class="material-symbols-outlined" style="color:#${b.c==='tertiary'?'50dad1':b.c==='secondary'?'e9c176':'ffb693'}">${b.icon}</span>
        <span class="font-headline text-lg tracking-wider">${b.lbl}</span>
      </button>`).join("")}
    </div>`;
  }

  // ══ STATS ══
  function tabStats(){
    const now=new Date();
    const allForKPI=[...hist,...extHist];
    const totalSessions=allForKPI.length;
    const totalMins=allForKPI.reduce((s,h)=>s+(h.duration||0),0);
    const axeSets=(state.axeHistory||[]).reduce((s,h)=>s+(h.sets||0),0);

    // Weekly bars ultimi 7gg
    const weekCounts=Array(7).fill(0);
    const dow=["LUN","MAR","MER","GIO","VEN","SAB","DOM"];
    allForKPI.forEach(h=>{
      try{const[d,m,y]=h.date.split("/").map(Number);const dt=new Date(y,m-1,d);
      const diff=Math.floor((now-dt)/(1000*60*60*24));
      if(diff>=0&&diff<7)weekCounts[6-diff]++;}catch(e){}
    });
    const maxW=Math.max(...weekCounts,1);

    // Distrib A/B/C
    const dist={A:0,B:0,C:0};
    hist.forEach(h=>{if(dist[h.day]!==undefined)dist[h.day]++;});
    const KPhex={A:"#ffb693",B:"#e9c176",C:"#50dad1"};

    return `<div class="space-y-6">
      <!-- KPI -->
      <div class="grid grid-cols-2 gap-3">
        ${[
          {l:"Sessioni totali",v:totalSessions,c:"primary"},
          {l:"Minuti totali",v:totalMins.toLocaleString(),c:"tertiary"},
          {l:"Set AXE",v:axeSets,c:"#8b5cf6",hex:true},
          {l:"HR media KB",v:hist.filter(h=>h.hrAvg).length?Math.round(hist.filter(h=>h.hrAvg).reduce((s,h)=>s+Number(h.hrAvg),0)/hist.filter(h=>h.hrAvg).length):"—",c:"error"},
        ].map(k=>`<div class="bg-surface-container ghost-border p-5 border-l-2" style="border-left-color:${k.hex?k.c:'var(--'+k.c+')'}||#ffb693">
          <p class="font-label text-[9px] uppercase tracking-widest text-gray-500 mb-2">${k.l}</p>
          <div class="font-headline text-5xl leading-none" style="color:${k.hex?k.c:''}; ${!k.hex?'--c:var(--'+k.c+')':''}"
            class="${!k.hex?'text-'+k.c:''}">${k.v}</div>
        </div>`).join("")}
      </div>
      <!-- Weekly bars -->
      <div class="bg-surface-container ghost-border p-5">
        <p class="font-label text-[9px] uppercase tracking-[0.2em] text-gray-500 mb-5">FREQUENZA — ULTIMI 7 GIORNI</p>
        <div class="flex items-end justify-between gap-2" style="height:60px">
          ${weekCounts.map((c,i)=>`<div class="flex-1 flex flex-col items-center gap-2">
            <div class="w-full relative bg-surface-container-low" style="height:52px">
              <div class="absolute bottom-0 left-0 right-0 bg-primary" style="height:${c>0?Math.round((c/maxW)*52)+4:3}px;${c>0?'box-shadow:0 0 6px rgba(255,182,147,0.3)':'opacity:0.3'}"></div>
            </div>
            <span class="font-label text-[8px] text-gray-600">${dow[i]}</span>
          </div>`).join("")}
        </div>
      </div>
      <!-- Distribuzione -->
      <div class="bg-surface-container ghost-border p-5">
        <p class="font-label text-[9px] uppercase tracking-[0.2em] text-gray-500 mb-4">DISTRIBUZIONE KB A/B/C</p>
        <div class="space-y-3">
          ${Object.entries(dist).map(([k,v])=>{
            const pct=hist.length?Math.round((v/hist.length)*100):0;
            return `<div>
              <div class="flex justify-between mb-1">
                <span class="font-headline text-lg" style="color:${KPhex[k]}">Giorno ${k}</span>
                <span class="font-headline text-lg text-gray-500">${v} · ${pct}%</span>
              </div>
              <div class="h-1.5 bg-surface-container-high overflow-hidden">
                <div style="height:100%;width:${pct}%;background:${KPhex[k]};box-shadow:0 0 6px ${KPhex[k]}66;transition:width 0.6s"></div>
              </div>
            </div>`;
          }).join("")}
        </div>
      </div>
    </div>`;
  }

  // ══ SALUTE ══
  function tabSalute(){
    const h=state.healthHistory||[];
    const prof=state.healthProfile||{};
    const f=state.healthForm||{};
    const lastWeight=h.filter(e=>e.weight).slice(-1)[0];
    const lastHRV=h.filter(e=>e.hrv).slice(-1)[0];
    const lastSleep=h.filter(e=>e.sleep).slice(-1)[0];
    const bmi=lastWeight&&prof.height?(lastWeight.weight/((prof.height/100)**2)).toFixed(1):null;
    const bmiC=!bmi?"#64748b":bmi<18.5?"#60a5fa":bmi<25?"#50dad1":bmi<30?"#e9c176":"#ffb4ab";

    function spark(data,key,color){
      const vals=data.filter(e=>e[key]!=null).slice(-7).map(e=>Number(e[key]));
      if(vals.length<2)return `<p class="font-label text-[9px] text-gray-600 mt-1">Dati insufficienti</p>`;
      const mn=Math.min(...vals)-1,mx=Math.max(...vals)+1;
      const W=100,H=28;
      const pts=vals.map((v,i)=>`${i/(vals.length-1)*W},${H-((v-mn)/(mx-mn))*H}`).join(" ");
      return `<svg viewBox="0 0 ${W} ${H}" class="w-full mt-2" style="height:28px">
        <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round"/>
        <circle cx="${vals.length>1?(1/(vals.length-1)*(vals.length-1)*W):0}" cy="${H-((vals[vals.length-1]-mn)/(mx-mn))*H}" r="2.5" fill="${color}"/>
      </svg>`;
    }

    return `<div class="space-y-4">
      <!-- KPI Salute -->
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-surface-container ghost-border p-5 col-span-2" style="border-left:2px solid ${bmiC}">
          <p class="font-label text-[9px] uppercase tracking-widest text-gray-500 mb-1">BMI</p>
          <div class="flex items-baseline gap-3">
            <span class="font-headline text-6xl leading-none" style="color:${bmiC}">${bmi||"—"}</span>
            <span class="font-headline text-xl" style="color:${bmiC}66">${!bmi?"—":bmi<18.5?"SOTTOPESO":bmi<25?"OTTIMALE":bmi<30?"SOVRAPPESO":"OBESITÀ"}</span>
          </div>
          ${bmi?`<div class="mt-3 h-1 bg-surface-container-high overflow-hidden"><div style="width:${Math.min((bmi/35)*100,100)}%;height:100%;background:${bmiC};box-shadow:0 0 6px ${bmiC}88"></div></div>`:""}
        </div>
        <div class="bg-surface-container ghost-border p-5 border-l-2 border-l-secondary">
          <p class="font-label text-[9px] uppercase tracking-widest text-gray-500 mb-1">Peso</p>
          <span class="font-headline text-5xl text-secondary">${lastWeight?.weight||"—"}</span>
          <span class="font-headline text-xl text-secondary/60 ml-1">KG</span>
          ${spark(h,'weight','#e9c176')}
        </div>
        <div class="bg-surface-container ghost-border p-5 border-l-2 border-l-tertiary">
          <p class="font-label text-[9px] uppercase tracking-widest text-gray-500 mb-1">HRV</p>
          <span class="font-headline text-5xl text-tertiary">${lastHRV?.hrv||"—"}</span>
          <span class="font-headline text-xl text-tertiary/60 ml-1">MS</span>
          ${spark(h,'hrv','#50dad1')}
        </div>
        <div class="bg-surface-container ghost-border p-5 border-b-2 border-b-primary/60">
          <p class="font-label text-[9px] uppercase tracking-widest text-gray-500 mb-1">Sonno</p>
          <span class="font-headline text-5xl">${lastSleep?.sleep||"—"}</span>
          <span class="font-headline text-xl text-gray-600 ml-1">ORE</span>
        </div>
        <div class="bg-surface-container ghost-border p-5 border-b-2 border-b-secondary/60">
          <p class="font-label text-[9px] uppercase tracking-widest text-gray-500 mb-1">Qualità</p>
          <span class="font-headline text-5xl">${lastSleep?.sleepQ||"—"}</span>
          <span class="font-headline text-xl text-gray-600 ml-1">/ 5</span>
        </div>
      </div>
      <!-- Form log salute -->
      <div class="bg-surface-container ghost-border p-6 border-l-2 border-l-primary">
        <h3 class="font-headline text-3xl mb-5">LOG OGGI</h3>
        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-3">
            <div><label class="font-label text-[8px] uppercase tracking-widest text-gray-500 block mb-1">Peso (kg)</label>
            <input class="log-input w-full" type="number" placeholder="70.5" step="0.1" value="${f.weight||''}" oninput="state.healthForm.weight=this.value" inputmode="decimal"/></div>
            <div><label class="font-label text-[8px] uppercase tracking-widest text-gray-500 block mb-1">HRV (ms)</label>
            <input class="log-input w-full" type="number" placeholder="65" value="${f.hrv||''}" oninput="state.healthForm.hrv=this.value" inputmode="numeric"/></div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div><label class="font-label text-[8px] uppercase tracking-widest text-gray-500 block mb-1">Sonno (ore)</label>
            <input class="log-input w-full" type="number" placeholder="7.5" step="0.5" value="${f.sleep||''}" oninput="state.healthForm.sleep=this.value" inputmode="decimal"/></div>
            <div><label class="font-label text-[8px] uppercase tracking-widest text-gray-500 block mb-1">Qualità (1–5)</label>
            <div class="flex gap-1 mt-1">${[1,2,3,4,5].map(v=>`<button onclick="state.healthForm.sleepQ=${v};render()"
              class="flex-1 py-2 font-headline text-base transition-all"
              style="background:${f.sleepQ===v?'rgba(255,182,147,0.15)':'transparent'};border:1px solid ${f.sleepQ===v?'#ffb693':'rgba(90,65,54,0.3)'};color:${f.sleepQ===v?'#ffb693':'#64748b'}">${v}</button>`).join("")}</div>
            </div>
          </div>
          <button onclick="saveHealthEntry()"
            class="w-full py-4 font-headline text-xl tracking-widest flex justify-between items-center px-5 active:scale-95 transition-transform"
            style="background:linear-gradient(135deg,#ffb693,#ff6b00);color:#000">
            SALVA OGGI
            <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">save</span>
          </button>
        </div>
      </div>
      <!-- Profilo -->
      <div class="bg-surface-container ghost-border p-5">
        <p class="font-label text-[9px] uppercase tracking-[0.2em] text-gray-500 mb-4">PROFILO</p>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="font-label text-[8px] uppercase tracking-widest text-gray-500 block mb-1">Altezza (cm)</label>
          <input class="log-input w-full" type="number" placeholder="175" value="${prof.height||''}" onchange="state.healthProfile.height=Number(this.value);saveHealthProfile();render()" inputmode="numeric"/></div>
          <div><label class="font-label text-[8px] uppercase tracking-widest text-gray-500 block mb-1">Età</label>
          <input class="log-input w-full" type="number" placeholder="35" value="${prof.age||''}" onchange="state.healthProfile.age=Number(this.value);saveHealthProfile();render()" inputmode="numeric"/></div>
        </div>
      </div>
    </div>`;
  }

  return `<div class="screen bg-background" style="padding-top:56px;">
    <main class="px-5 pt-8 pb-12">
      <header class="mb-8">
        <h1 class="font-headline text-6xl tracking-tight leading-none">LOG</h1>
        <div class="w-12 h-1 bg-primary mt-2"></div>
      </header>
      ${subNav}
      ${logSub==="sessioni"?tabSessioni():logSub==="stats"?tabStats():tabSalute()}
    </main>
    ${navHTML("log")}
  </div>`;
}

// ── RENDER AXE SETUP PAGE ─────────────────────────────────────────────────────
function renderAxe(){
  const pr=state.axeProgress;
  const ax=state.axe;

  // Calcolo fase e progressione
  const phases=[
    {id:"fase 1",label:"4 reps / set",desc:"10 → 30 set a 4 reps",maxSets:30,reps:4},
    {id:"fase 2",label:"6 reps / set",desc:"10 → 30 set a 6 reps",maxSets:30,reps:6},
    {id:"fase 3",label:"+ peso",desc:"Aumenta KB, ricomincia da 4 reps",maxSets:30,reps:4},
  ];
  const curPhaseIdx=phases.findIndex(p=>p.id===pr.phase)||0;
  const curPhase=phases[curPhaseIdx]||phases[0];
  const progPct=Math.min(100,Math.round((pr.currentSets/curPhase.maxSets)*100));
  const nextTarget=pr.currentSets<10?10:pr.currentSets<20?20:30;

  // Storico AXE ultime 4 sessioni
  const axHist=state.axeHistory.slice(-4).reverse();
  const histRows=axHist.length===0
    ?`<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nessuna sessione AXE ancora completata.</div>`
    :axHist.map(h=>`
      <div class="axe-hist-row">
        <div>
          <div class="axe-hist-sets">${h.sets} <span style="font-size:14px;color:var(--muted)">set</span></div>
          <div style="font-size:11px;color:var(--muted)">${h.reps} reps/set · ${h.restSec}" rest</div>
        </div>
        <div class="axe-hist-meta">
          ${h.date}<br>
          ${h.weight||'10'} kg
          ${h.talkTest==="ok"?'<br><span style="color:#00BFA5">✅ talk OK</span>':h.talkTest==="fail"?'<br><span style="color:#EF5350">❌ affannato</span>':""}
        </div>
      </div>`).join("");

  // Stepper reps
  const repsOpts=[2,4,6];
  const repsHTML=repsOpts.map(v=>`
    <button class="axe-phase-pill ${ax.repsPerSet===v?'active':''}"
      onclick="axeSetReps(${v})" style="${ax.repsPerSet===v?'font-size:13px;':'font-size:13px;'}">
      ${v} reps
    </button>`).join("");

  // Stepper rest
  const restOpts=[{v:45,l:"45\""},{v:60,l:"1'"},{v:90,l:"1'30\""},{v:120,l:"2'"}];
  const restHTML=restOpts.map(o=>`
    <button class="axe-phase-pill ${ax.restSec===o.v?'active':''}"
      onclick="axeSetRest(${o.v})" style="font-size:13px;">
      ${o.l}
    </button>`).join("");

  // Target set suggerito
  const suggestedSets=pr.currentSets<10?10:pr.currentSets<20?pr.currentSets+2:Math.min(pr.currentSets+2,30);

  return `<div class="screen bg-background" style="padding-top:64px;">
    <div class="axe-page">

      <div class="axe-page-header">
        <div class="axe-page-label">ANTI-GLYCOLYTIC TRAINING</div>
        <div class="axe-page-title">KETTLEBELL<br>AXE</div>
        <div class="axe-page-sub">OTM — Ogni minuto esegui il set, il resto è recupero.<br>Fermati ai primi segnali di cedimento.</div>
      </div>

      <!-- Setup -->
      <div class="axe-setup-card">
        <div class="axe-setup-title">CONFIGURAZIONE SESSIONE</div>

        <div style="margin-bottom:12px;">
          <div class="axe-param-lbl" style="font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:7px;">ESERCIZIO</div>
          <div style="display:flex;flex-direction:column;gap:7px;">
            ${Object.entries(AXE_EX).map(([k,ex])=>`
              <button onclick="axeSetExercise('${k}')"
                style="display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;
                  background:${ax.exercise===k?'#1A0025':'#0A0010'};
                  border:1.5px solid ${ax.exercise===k?'var(--axe)':'#2A0035'};
                  color:${ax.exercise===k?'var(--axeGlow)':'var(--muted)'};text-align:left;width:100%;">
                <span style="font-size:22px;">${ex.emoji}</span>
                <span style="flex:1;">
                  <span style="font-weight:700;font-size:14px;display:block;">${ex.label}</span>
                  <span style="font-size:11px;">${ex.level}</span>
                </span>
                ${ax.exercise===k?'<span style="color:var(--axe);font-size:18px;">●</span>':''}
              </button>`).join("")}
          </div>
        </div>

        <div style="margin-bottom:12px;">
          <div class="axe-param-lbl" style="font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:7px;">REPS PER SET</div>
          <div style="display:flex;gap:8px;">${repsHTML}</div>
        </div>

        <div style="margin-bottom:12px;">
          <div class="axe-param-lbl" style="font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:7px;">RECUPERO POST-SET</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">${restHTML}</div>
        </div>

        <div>
          <div class="axe-param-lbl" style="font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:7px;">TARGET SET OGGI</div>
          <div class="axe-stepper">
            <button class="axe-step-btn" onclick="axeChangeTarget(-2)">−</button>
            <span class="axe-step-val" id="axe-target-val">${ax.targetSets}</span>
            <button class="axe-step-btn" onclick="axeChangeTarget(2)">+</button>
            <span class="axe-step-unit">set (suggerito: ${suggestedSets})</span>
          </div>
        </div>

      </div>

      <!-- Stop signs -->
      <div class="axe-stop-box">
        <div class="axe-stop-title">🛑 SEGNALI DI STOP — FERMA LA SESSIONE</div>
        <div class="axe-stop-item"><span class="axe-stop-n">1</span>La velocità del set cala in modo evidente</div>
        <div class="axe-stop-item"><span class="axe-stop-n">2</span>La cadenza si riduce (meno reps completate per minuto)</div>
        <div class="axe-stop-item"><span class="axe-stop-n">3</span>La tecnica si deteriora — non riesci a fare reps pulite</div>
        <div class="axe-stop-item"><span class="axe-stop-n">4</span>Senti bruciore muscolare (zona glicolitica)</div>
        <div class="axe-stop-item"><span class="axe-stop-n">5</span>Non riesci più a parlare in frasi brevi durante il riposo</div>
      </div>

      <!-- Progressione -->
      <div class="axe-prog-card">
        <div class="axe-prog-title">PROGRESSIONE — ${pr.phase.toUpperCase()}</div>
        <div class="axe-prog-sub">${curPhase.desc} · KB 10 kg</div>
        <div class="axe-prog-bar-wrap"><div class="axe-prog-bar" style="width:${progPct}%"></div></div>
        <div class="axe-prog-labels">
          <span>0 set</span><span style="color:var(--axeGlow)">${pr.currentSets} raggiunto</span><span>${curPhase.maxSets} set</span>
        </div>
        <div style="margin-top:12px;font-size:12px;color:var(--muted);">
          Prossimo step: <span style="color:var(--axeGlow)">arriva a ${nextTarget} set</span> consecutivi con tecnica pulita → avanza
        </div>
        <div class="axe-prog-phase">
          ${phases.map(function(p){return '<div class="axe-phase-pill '+(p.id===pr.phase?'active':'')+'">'+ p.label+'</div>';}).join("")}
        </div>
      </div>

      <!-- Storico -->
      <div class="axe-hist-section">
        <div class="axe-hist-label">ULTIME SESSIONI AXE</div>
        ${histRows}
      </div>

      <div style="height:14px;"></div>

    </div>

    <!-- Bottone start fisso sopra nav -->
    <button class="axe-start-btn" onclick="startAxeSession()">🪓 INIZIA SESSIONE AXE</button>
    <div style="height:8px;"></div>
    ${navHTML("axe")}
  </div>`;
}

// ── RENDER AXE WORKOUT ────────────────────────────────────────────────────────
function renderAxeWorkout(){
  const ax=state.axe;
  const isWork=ax.phase==="work";
  const isRest=ax.phase==="rest";
  const isIdle=ax.phase==="idle";

  const accentCol=isWork?"#9C27B0":isRest?"#1565C0":"#607080";

  // Ring timer (solo durante rest OTM)
  let ringSection="";
  if(isRest){
    ringSection=`<div class="axe-ring-wrap">${ringHTML(ax.restSec,ax.restRemaining,"#1565C0",ax.restRemaining<=3&&ax.restRemaining>0)}</div>`;
  } else if(isWork){
    ringSection=`<div class="axe-ring-wrap">
      <svg width="160" height="160" style="filter:drop-shadow(0 0 18px #9C27B055)">
        <circle cx="80" cy="80" r="68" fill="none" stroke="#2A0040" stroke-width="9"/>
        <circle cx="80" cy="80" r="68" fill="none" stroke="#9C27B0" stroke-width="9"/>
        <text x="80" y="94" text-anchor="middle" fill="#CE93D8" font-family="'Bebas Neue',sans-serif" font-size="32">EXECUTE</text>
      </svg>
    </div>`;
  } else {
    ringSection=`<div class="axe-ring-wrap">
      <div class="no-timer-circle" style="border-color:#2A0040;">🪓</div>
    </div>`;
  }

  // Talk test banner (appare dopo metà sessione, una volta sola)
  const halfWay=ax.setsDone>=Math.floor(ax.targetSets/2);
  const talkBanner=(halfWay&&!ax.talkAnswered&&isRest)?`
    <div class="axe-talk-banner">
      <span class="axe-talk-icon">💬</span>
      <span class="axe-talk-text">Riesci a parlare in frasi brevi? Se sì, sei in zona AGT.</span>
      <button class="axe-talk-ok" onclick="axeTalkAnswer('ok')">Sì</button>
      <button class="axe-talk-ko" onclick="axeTalkAnswer('fail')">No</button>
    </div>`:"";

  // Fase display
  const phaseName=isWork?"SET":isRest?"RIPOSO":"PRONTO";
  const phaseHint=isWork
    ?`${ax.repsPerSet} reps · tecnica pulita · velocità costante`
    :isRest
    ?`Recupero — prossimo set al suono`
    :`Premi START per iniziare il primo set`;

  // Bottone principale
  let actionRow="";
  if(isIdle){
    actionRow=`<div class="axe-action-row">
      <button class="axe-btn-go" style="background:#9C27B0;" onclick="axeStartSet()">▶ START — esegui il set</button>
      <button class="axe-btn-abort" onclick="axeFinishSession()">Fine sessione</button>
    </div>`;
  } else if(isWork){
    actionRow=`<div class="axe-action-row" style="flex-direction:column;gap:10px;">
      <button class="axe-btn-go" style="background:#00BFA5;font-size:22px;padding:22px;" onclick="axeSetDone()">✅ SET FATTO</button>
      <div style="display:flex;gap:10px;">
        <button class="axe-btn-abort" style="flex:1;" onclick="axeAbortSet()">🛑 Stop anticipato</button>
        <button class="axe-btn-abort" style="flex:1;" onclick="axeFinishSession()">Fine sessione</button>
      </div>
    </div>`;
  } else {
    // REST
    actionRow=`<div class="axe-action-row">
      <button class="axe-btn-go" style="background:#1565C0;opacity:0.7;font-size:15px;" onclick="axeSkipRest()">⏭ Salta rest</button>
      <button class="axe-btn-abort" onclick="axeFinishSession()">Fine sessione</button>
    </div>`;
  }

  return `<div class="screen axe-wk-screen">

    <!-- HUD superiore -->
    <div class="axe-hud">
      <div class="axe-hud-item">
        <div class="axe-hud-val" style="color:var(--axeGlow)">${ax.setsDone}</div>
        <div class="axe-hud-lbl">SET FATTI</div>
      </div>
      <div class="axe-hud-item">
        <div class="axe-hud-val" style="color:var(--muted)">${ax.targetSets}</div>
        <div class="axe-hud-lbl">TARGET</div>
      </div>
      <div class="axe-hud-item">
        <div class="axe-hud-val" style="color:#FFC107">${ax.repsPerSet}</div>
        <div class="axe-hud-lbl">REPS</div>
      </div>
      <div class="axe-hud-item">
        <div class="axe-hud-val" style="color:#2196F3">${ax.restSec}"</div>
        <div class="axe-hud-lbl">REST OTM</div>
      </div>
    </div>

    <!-- Progress bar sets -->
    <div class="progress-wrap" style="margin:0;">
      <div class="progress-bar" style="width:${Math.min(100,ax.setsDone/ax.targetSets*100).toFixed(1)}%;background:var(--axe);"></div>
    </div>

    <!-- Fase -->
    <div class="axe-phase-display">
      <div class="axe-phase-name" style="color:${accentCol};${isRest?'':''}${isRest?'class="axe-rest-pulse"':''}">${phaseName}</div>
      <div class="axe-phase-hint">${phaseHint}</div>
    </div>

    ${ringSection}

    <!-- Reps display -->
    <div class="axe-reps-display">
      <div class="axe-reps-num" style="color:${accentCol}">${ax.repsPerSet}</div>
      <div class="axe-reps-lbl">${AXE_EX[ax.exercise||"swing"].emoji} ${AXE_EX[ax.exercise||"swing"].label}</div>
    </div>

    ${talkBanner}

    <!-- Cue tecnica + Video -->
    <div style="background:#0A0010;border-radius:12px;margin:0 18px 12px;padding:12px 16px;border:1px solid #2A0035;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <div style="font-size:11px;letter-spacing:2px;color:var(--muted);">CUE TECNICA</div>
        <a href="${AXE_EX[ax.exercise||"swing"].yt}" target="_blank"

  const talkOK=ax.talkAnswered==="ok";

  // Suggerimento prossima sessione
  let nextSugg="";
  if(ax.setsDone>=state.axe.targetSets){
    nextSugg=`✅ Target raggiunto! Prossima sessione: <b>+2 set</b>`;
  } else {
    nextSugg=`Arrivato a ${ax.setsDone} set — prossima sessione: <b>stesso target</b>`;

  return `<div class="screen bg-background" style="padding-top:64px;">

        <div style="font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:6px;">PROSSIMA SESSIONE</div>
        <div style="font-size:14px;color:var(--text);line-height:1.6;">${nextSugg}</div>

// Helper: costruisce un tag HTML per i macro-tag senza backtick annidati
function macroTagHTML(t){
  return '<span class="macro-tag" style="background:'+t.c+'22;color:'+t.c+';border:1px solid '+t.c+'44;">'+t.t+'</span>';
}
function macroWeekRowHTML(w){
  return '<div class="macro-week-row">'
    +'<div class="macro-week-label">'+w.label+'</div>'
    +'<div class="macro-week-tags">'
    +w.tags.map(macroTagHTML).join("")
    +'<span style="font-size:10px;color:var(--muted);align-self:center;margin-left:4px;">'+w.note+'</span>'
    +'</div></div>';
}
function microDayBoxHTML(d,DAYS_IT){
  const hasDot=d.act!=="—";
  return '<div class="micro-day-box" style="background:'+(hasDot?d.col+'18':'#080C0F')+';border-color:'+(hasDot?d.col:'#1E2A35')+';">'
    +'<div class="micro-day-name">'+DAYS_IT[d.d].toUpperCase()+'</div>'
    +'<div class="micro-day-act" style="color:'+(hasDot?d.col:'#1E2A35')+'">'+d.act+'</div>'
    +'</div>';
}

function renderPrograms(){
  const DAYS_IT=["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
  const ap=state.activeProgram;

  // ── Suggerimento automatico basato sullo storico ──
  const todayDow=new Date().getDay();
  const lastWeek=state.history.slice(-14);
  const lastAxe=state.axeHistory.slice(-7);
  const thisWeekABC=lastWeek.filter(h=>{
    const [d,m,y]=h.date.split("/").map(Number);
    const dt=new Date(y,m-1,d);
    return (Date.now()-dt)<7*86400000;
  });
  const thisWeekAXE=lastAxe.filter(h=>{
    const [d,m,y]=h.date.split("/").map(Number);
    const dt=new Date(y,m-1,d);
    return (Date.now()-dt)<7*86400000;
  });
  const abcCount=thisWeekABC.length;
  const axeCount=thisWeekAXE.length;
  const daysDone=thisWeekABC.map(h=>h.day);

  let suggText="",suggChips=[];
  if(abcCount===0&&axeCount===0){
    suggText="Nessun allenamento questa settimana. Inizia con un Giorno A per rimettere in moto il pattern.";
    suggChips=[{t:"Oggi: Giorno A",c:"#FF5722"}];
  } else if(axeCount===0&&abcCount>=1){
    suggText=`Hai fatto ${abcCount} sessione/i tecnica/e senza AXE. Inserisci almeno 1 sessione AXE questa settimana per costruire il motore aerobico.`;
    suggChips=[{t:"Prossima: AXE Swing 4×10",c:"#9C27B0"}];
  } else if(axeCount>=2&&abcCount===0){
    suggText="Stai facendo solo AXE. Bene per il cardiovascolare — ma aggiungi almeno 1 giorno tecnico per non perdere coordinazione e forza.";
    suggChips=[{t:"Aggiungi: Giorno A o C",c:"#FF5722"}];
  } else if(abcCount>=3&&axeCount>=2){
    suggText="Settimana intensa! Valuta un giorno di riposo prima di continuare — il recupero è parte del programma.";
    suggChips=[{t:"Suggerimento: riposo oggi",c:"#607080"}];
  } else {
    const missing=["A","B","C"].filter(d=>!daysDone.includes(d));
    var missingStr=missing.length?"Giorni non ancora fatti: "+missing.join(", ")+".":"";suggText="Questa settimana: "+abcCount+" sessione/i tecniche, "+axeCount+" AXE. "+missingStr;
    if(missing.length)missing.forEach(d=>suggChips.push({t:`Giorno ${d}`,c:dayColor(d)}));
    if(axeCount<2)suggChips.push({t:"+ 1 AXE",c:"#9C27B0"});
  }

  const suggChipsHTML=suggChips.map(function(c){
    return '<div class="prog-day-chip" style="border-color:'+c.c+';color:'+c.c+';background:'+c.c+'18;">'+c.t+'</div>';
  }).join("");

  // ── Microcicli ──
  const microCards=MICROCYCLES.map(function(mc){
    const isActive=ap&&ap.id===mc.id;
    const sortedDays=[...(mc.days||[])].sort((a,b)=>a.d-b.d);
    const dayBoxes=sortedDays.map(d=>microDayBoxHTML(d,DAYS_IT)).join("");
    const btnHTML=isActive
      ?'<button class="micro-activate-btn" style="background:#001A10;border:1.5px solid #00BFA5;color:#00BFA5;" onclick="deactivateProgram()">✅ Attivo — Disattiva</button>'
      :'<button class="micro-activate-btn" style="background:'+mc.color+';color:#fff;" onclick="activateProgram(\'micro\',\''+mc.id+'\')">▶ Attiva questo microciclo</button>';
    return '<div class="micro-card '+(isActive?'active-prog':'')+'"><div class="micro-card-header"><span class="micro-card-emoji">'+mc.emoji+'</span><div><div class="micro-card-title">'+mc.title+'</div><div class="micro-card-sub">'+mc.subtitle+'</div></div></div>'
      +'<div class="micro-week">'+dayBoxes+'</div>'
      +'<div style="font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5;">'+mc.desc+'</div>'
      +btnHTML+'</div>';
  }).join("");

  // ── Macrocicli ──
  const macroCards=MACROCYCLES.map(function(mc){
    const isActive=ap&&ap.id===mc.id;
    const weekRows=mc.weeks.map(macroWeekRowHTML).join("");
    const btnHTML=isActive
      ?'<button class="micro-activate-btn" style="background:#1A1200;border:1.5px solid #FFC107;color:#FFC107;margin-top:6px;" onclick="deactivateProgram()">✅ Attivo — Disattiva</button>'

      +'<div style="font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5;">'+mc.desc+'</div>'
      +'<div class="macro-weeks">'+weekRows+'</div>'
      +btnHTML+'</div>';
  }).join("");

  // ── Mobilità warm-up ──
  const mobCards=MOBILITY_EX.map(function(ex){
    return '<div class="mob-card"><div class="mob-emoji">'+ex.emoji+'</div><div class="mob-name">'+ex.name+'</div><div class="mob-sets">'+ex.sets+'</div><div class="mob-cue">'+ex.cue+'</div><a href="'+ex.yt+'" target="_blank" class="mob-yt">▶️ Video</a></div>';
  }).join("");

  return `<div class="screen bg-background" style="padding-top:64px;">
    <div class="prog-page">

      <div class="prog-header">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:5px;color:#00BFA5;margin-bottom:4px;">PIANIFICAZIONE</div>
        <div class="prog-header-title">PROGRAMMI</div>
        <div class="prog-header-sub">Ispirati, scegli un template o attivalo come guida settimanale.</div>
      </div>

      <!-- Nota AXE -->
      <div style="background:#0A0A1F;border:1.5px solid #2A3A6A;border-radius:14px;margin:0 18px 4px;padding:14px 16px;">
        <div style="font-size:11px;letter-spacing:2px;color:#7CB3FF;margin-bottom:6px;">COME FUNZIONA AXE</div>
        <div style="font-size:13px;color:var(--text);line-height:1.7;">
          Una sessione AXE = <b>1 solo esercizio × N set</b>, con recupero quasi completo tra i set (OTM).<br>
          <span style="color:var(--muted);">Non è circuit training. L'obiettivo è fare volume senza accumulare acido lattico — fermati ai primi segnali di cedimento.</span>
        </div>
        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">
          <span style="font-size:11px;background:#1A2A4A;color:#7CB3FF;padding:4px 10px;border-radius:8px;">4 reps/set · 60" rest</span>
          <span style="font-size:11px;background:#1A2A4A;color:#7CB3FF;padding:4px 10px;border-radius:8px;">Aumenta set gradualmente</span>
          <span style="font-size:11px;background:#1A2A4A;color:#7CB3FF;padding:4px 10px;border-radius:8px;">Talk test al 50%</span>
        </div>
      </div>

      <!-- Suggerimento automatico -->
      <div class="prog-section">
        <div class="prog-section-label">💡 SUGGERIMENTO BASATO SULLO STORICO</div>
        <div class="prog-suggest-card">
          <div class="prog-suggest-title">Questa settimana</div>
          <div class="prog-suggest-row">${suggChipsHTML}</div>
          <div class="prog-suggest-note">${suggText}</div>
        </div>
      </div>

      <!-- Microcicli -->
      <div class="prog-section">
        <div class="prog-section-label">📅 MICROCICLO SETTIMANALE</div>
        ${microCards}
      </div>

      <!-- Macrocicli -->
      <div class="prog-section">
        <div class="prog-section-label">🗓 MACROCICLO MENSILE (4 SETTIMANE)</div>
        ${macroCards}
      </div>

      <!-- Mobilità -->
      <div class="prog-section">
        <div class="prog-section-label">🌀 WARM-UP / MOBILITÀ (prima di ogni sessione)</div>
        <div style="background:#0A0A0A;border:1px solid #1E2A35;border-radius:12px;padding:12px 14px;margin-bottom:10px;font-size:13px;color:var(--muted);line-height:1.6;">
          Esegui 2–3 esercizi a scelta prima di A, B, C o AXE. Non sono esercizi AGT — servono ad aprire le articolazioni e attivare il pattern di movimento.
        </div>
        <div class="mob-grid">${mobCards}</div>
      </div>

      <div style="height:20px;"></div>
    </div>
    ${navHTML("programs")}
  </div>`;
}

  // ── D1: Total Tension Complex (adattato KB singola) ───────────────────────
  {
    id:"D1",label:"GIORNO D1",emoji:"🔩",color:"#FF1744",
    title:"Total Tension Complex",
    meta:"Pavel / StrongFirst · ~25 min · Step Cycle 6 sett.",
    totalMin:25,
    how:"Complesso Pavel adattato a KB singola — Clean → Strict Press → Front Squat → Renegade Row, tutto su un lato senza posare. Schema piramidale: sali di 1 rep per set poi scendi. Il Renegade Row è sempre 1 rep/lato. Tensione totale su ogni muscolo per tutta la durata del set.",
    structure:[
      ["Schema","Clean → Press → Front Squat → Row"],
      ["Esecuzione","Lato SX completo → poi DX"],
      ["Formato","Piramide 1-2-3-...-3-2-1"],
      ["Row","Sempre 1 rep/lato indipendente"],
      ["Progressione","+1 rep al picco ogni 2 sett."],
      ["Durata totale","~25 min"],
    ],
    exercises:[
      {n:"1",name:"KB Clean",detail:"Traiettoria vicina al corpo → rack preciso",t:"SX→DX",c:"#FF1744"},
      {n:"2",name:"KB Press",detail:"Strict — nessun dip, tutto il corpo teso",t:"SX→DX",c:"#FF1744"},
      {n:"3",name:"Front Squat",detail:"KB in rack — squat profondo, pausa 1\" in basso",t:"SX→DX",c:"#FF1744"},
      {n:"4",name:"Renegade Row",detail:"Plank alto su KB — spingi giù, tira verso l'anca",t:"1/lato",c:"#FF1744"},
      {n:"R",name:"Rest libero",detail:"30\"–3' a seconda della fatica",t:"libero",c:"#1565C0"},
    ],
    tips:[
      "Renegade Row: spingi FORTE con la mano a terra mentre tiri — questa tensione irradiante è il cuore del programma.",
      "Strict Press: glutes, core e gambe contratti durante tutta la spinta — non è solo un esercizio di spalla.",
      "Progressione: sett. 1–2 picco 3 rep, sett. 3–4 picco 4, sett. 5–6 picco 5. Non anticipare — consolida prima di salire."
    ],
    buildSeq:function(){
      // Leggi picco dal localStorage o default 3
      const saved=localStorage.getItem("kb-d1-peak");
      const peak=saved?Number(saved):3;
      // Piramide: 1,2,...,peak,...,2,1
      const pyramid=[];
      for(let i=1;i<=peak;i++) pyramid.push(i);
      for(let i=peak-1;i>=1;i--) pyramid.push(i);

      const seq=[];
      pyramid.forEach((reps,si)=>{
        // Lato SX
        seq.push({name:"KB Clean",round:si+1,totalRounds:pyramid.length,timerSec:null,type:"ladder",
          repsOverride:`${reps} rep — lato SX`,cueOverride:"Traiettoria vicina al corpo → rack preciso"});
        seq.push({name:"KB Press",round:si+1,totalRounds:pyramid.length,timerSec:null,type:"ladder",
          repsOverride:`${reps} rep — lato SX`,cueOverride:"Strict — tutto il corpo teso, lockout duro"});
        seq.push({name:"Front Squat",round:si+1,totalRounds:pyramid.length,timerSec:null,type:"ladder",
          repsOverride:`${reps} rep — lato SX`,cueOverride:"KB in rack — squat profondo, pausa 1\" in basso"});
        seq.push({name:"Renegade Row",round:si+1,totalRounds:pyramid.length,timerSec:null,type:"ladder",
          repsOverride:"1 rep — lato SX",cueOverride:"Plank alto — spingi giù con DX, tira SX verso l'anca"});
        // Lato DX
        seq.push({name:"KB Clean",round:si+1,totalRounds:pyramid.length,timerSec:null,type:"ladder",
          repsOverride:`${reps} rep — lato DX`,cueOverride:"Stesso pattern — rack pulito DX"});
        seq.push({name:"KB Press",round:si+1,totalRounds:pyramid.length,timerSec:null,type:"ladder",
          repsOverride:`${reps} rep — lato DX`,cueOverride:"Strict — lockout completo, poi riabbassa lento"});
        seq.push({name:"Front Squat",round:si+1,totalRounds:pyramid.length,timerSec:null,type:"ladder",
          repsOverride:`${reps} rep — lato DX`,cueOverride:"KB in rack DX — stessa qualità del lato SX"});
        seq.push({name:"Renegade Row",round:si+1,totalRounds:pyramid.length,timerSec:null,type:"ladder",
          repsOverride:"1 rep — lato DX",cueOverride:"Plank alto — spingi giù con SX, tira DX verso l'anca"});
        // Rest (non sull'ultimo set)
        if(si<pyramid.length-1){
          seq.push({name:"Rest libero",round:si+1,totalRounds:pyramid.length,timerSec:90,type:"rest",
            repsOverride:`Set ${si+1}/${pyramid.length} completato · picco: ${peak} rep`,
            cueOverride:"Rest 90\" o più se necessario — qualità > velocità"});
        }
      });
      return seq;
    }
  }
];

function getExtraById(id){return EXTRA_WORKOUTS.find(w=>w.id===id);}

function toggleExtraCard(id){
  const body=document.getElementById("extra-body-"+id);
  const arrow=document.getElementById("extra-arrow-"+id);
  const card=document.getElementById("extra-card-"+id);
  if(!body)return;
  const open=body.style.display==="block";
  // chiudi tutte le card aperte
  EXTRA_WORKOUTS.forEach(w=>{
    const b=document.getElementById("extra-body-"+w.id);
    const a=document.getElementById("extra-arrow-"+w.id);
    const c=document.getElementById("extra-card-"+w.id);
    if(b){b.style.display="none";}
    if(a){a.textContent="›";a.style.transform="rotate(0deg)";}
    if(c){c.style.borderColor="#1E2A35";}
  });
  // se era chiusa, apri quella cliccata
  if(!open){
    body.style.display="block";
    arrow.textContent="›";
    arrow.style.transform="rotate(90deg)";
    card.style.borderColor=EXTRA_WORKOUTS.find(w=>w.id===id)?.color||"#FF5722";
    // scroll alla card
    setTimeout(()=>card.scrollIntoView({behavior:"smooth",block:"nearest"}),50);
  }
}

function startExtraWorkout(id){
  unlockAudio();
  clearTimerInterval();
  requestWakeLock();
  const w=getExtraById(id);
  if(!w)return;

  // Bellplex complexes: flusso dedicato con vista round completa
  if(id.startsWith("BP")){
    state={...state,
      tab:"bp-workout",
      extraWorkoutId:id,
      bpSerie:1,           // serie corrente (1-5)
      bpResting:false,     // true = in rest tra serie
      bpDone:false,        // true = tutte le serie completate
      remaining:0,
      timerRunning:false,
      startTime:Date.now(),
      logForm:{feeling:null,hrAvg:"",hrMax:"",weight:"10",talkTest:null,notes:""}
    };
    render();
    return;
  }

  const seq=w.buildSeq();
  const step=seq[0];
  state={...state,
    tab:"workout",
    dayKey:"extra_"+id,
    extraWorkoutId:id,
    stepIdx:0,
    remaining:step.timerSec??0,
    timerRunning:true,
    startTime:Date.now(),
    logForm:{feeling:null,hrAvg:"",hrMax:"",weight:"10",talkTest:null,notes:""}
  };
  DAYS["extra_"+id]={
    label:w.label,subtitle:w.title,focus:w.meta,
    color:w.color,emoji:w.emoji,seq,totalMin:w.totalMin
  };
  render();
  if(step.timerSec)startTimerInterval();
}

function bpNextSerie(){
  const totalSerie=5;
  const serie=state.bpSerie||1;
  if(serie>=totalSerie){
    state.bpDone=true;
    render();
    return;
  }
  // Avvia rest timer 75"
  state.bpSerie=serie+1;
  state.bpResting=true;
  state.remaining=75;
  state.timerRunning=true;
  render();
  startBpRestTimer();
}

let bpRestInterval=null;
function startBpRestTimer(){
  if(bpRestInterval) clearInterval(bpRestInterval);
  bpRestInterval=setInterval(()=>{
    if(!state.bpResting){clearInterval(bpRestInterval);return;}
    state.remaining--;
    if(state.remaining<=0){
      clearInterval(bpRestInterval);
      state.bpResting=false;
      state.remaining=0;
      if(navigator.vibrate) navigator.vibrate([100,50,200]);
      render();
    } else {
      // Aggiorna solo il numero del timer senza re-render completo
      const el=document.querySelector('[data-bp-timer]');
      if(el) el.textContent=state.remaining+'"';
      else render();
    }
  },1000);
}

function bpSkipRest(){
  if(bpRestInterval) clearInterval(bpRestInterval);
  state.bpResting=false;
  state.remaining=0;
  render();
}

function exitBellplex(){
  if(bpRestInterval) clearInterval(bpRestInterval);
  clearTimerInterval();
  releaseWakeLock();
  state.tab="extra-detail";
  state.extraDetailId=state.extraWorkoutId;
  state.bpResting=false;
  state.bpDone=false;
  state.timerRunning=false;
  render();
}

function saveBellplexDone(){
  const id=state.extraWorkoutId;
  const w=getExtraById(id);
  const entry={
    day:"extra_"+id,
    date:new Date().toLocaleDateString("it-IT"),
    duration:w?.totalMin||20,
    feeling:state.logForm.feeling,
    hrAvg:state.logForm.hrAvg?Number(state.logForm.hrAvg):null,
    weight:state.logForm.weight||"10",
    notes:state.logForm.notes||"",
    talkTest:null,
  };
  state.history.push(entry);
  saveHistory();
  if(bpRestInterval) clearInterval(bpRestInterval);
  releaseWakeLock();
  state.extraWorkoutId=null;
  state.bpDone=false;
  state.bpSerie=1;
  state.tab="train";
  render();
  showToast("✅ Sessione salvata","ok");
}

function planSuggest(){

  if(dow===0&&p.sunOptional) return {type:"rings",reason:"Domenica opzionale anelli attiva."};

// ── ACTIONS ───────────────────────────────────────────────────────────────────
// ── WAKE LOCK ─────────────────────────────────────────────────────────────────
let wakeLock=null;
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock=await navigator.wakeLock.request('screen');
    }
  }catch(e){}
}
function releaseWakeLock(){
  if(wakeLock){wakeLock.release();wakeLock=null;}
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&state.tab==='workout'){requestWakeLock();}
});

function startWorkout(key){
  unlockAudio();
  clearTimerInterval();
  requestWakeLock();
  const step=DAYS[key].seq[0];
  state={...state,
    tab:"workout",dayKey:key,stepIdx:0,
    remaining:step.timerSec??0,timerRunning:true,startTime:Date.now(),
    logForm:{feeling:null,hrAvg:"",hrMax:"",weight:"10",talkTest:null,notes:""}
  };
  render();
  if(step.timerSec)startTimerInterval();
}

function exitWorkout(){
  clearTimerInterval();releaseWakeLock();
  if(state.extraWorkoutId){state.tab="extra-detail";}
  else if(state.dayKey==="bw_jacked"||state.dayKey==="bw_circuit"){state.tab="plan";}
  else{state.tab="home";}
  state.timerRunning=false;render();
}
function goHome(){clearTimerInterval();releaseWakeLock();state.extraWorkoutId=null;state.tab="home";state.timerRunning=false;render();}

function nextStep(){
  clearTimerInterval();
  const seq=DAYS[state.dayKey].seq;
  if(state.stepIdx>=seq.length-1){
    state.workoutMins=Math.round((Date.now()-state.startTime)/60000);
    state.workoutSteps=seq.length;
    state.tab="done";
    state.timerRunning=false;
    releaseWakeLock();
    render();
    return;
  }
  state.stepIdx++;
  const step=seq[state.stepIdx];
  state.remaining=step.timerSec??0;
  state.timerRunning=!!step.timerSec;
  render();
  if(step.timerSec)startTimerInterval();
}

function toggleTimer(){
  if(state.timerRunning){
    clearTimerInterval();state.timerRunning=false;render();
  }else{
    unlockAudio();state.timerRunning=true;render();startTimerInterval();
  }
}

function resetTimer(){
  clearTimerInterval();
  const step=DAYS[state.dayKey].seq[state.stepIdx];
  state.remaining=step.timerSec;state.timerRunning=false;render();
}

function startTimerInterval(){
  timerInterval=setInterval(()=>{
    state.remaining--;
    if(state.remaining===3||state.remaining===2||state.remaining===1)beepTick();
    if(state.remaining<=0){
      clearTimerInterval();state.timerRunning=false;
      beepEnd();
      setTimeout(()=>nextStep(),950);
      return;
    }
    const step=DAYS[state.dayKey].seq[state.stepIdx];
    const isRest=step.type==="rest"||step.name==="Rest";
    const isAmrap=!!step.isAmrap;
    const KPhex={A:"#ffb693",B:"#e9c176",C:"#50dad1"};
    const accentColor=isRest?"#50dad1":isAmrap?"#e9c176":(KPhex[state.dayKey]||"#ffb693");
    const countdown=state.remaining<=3;
    const glowColor=countdown?"#ffb4ab":accentColor;
    const disp=document.getElementById("timer-display");
    if(disp){disp.textContent=fmtTime(state.remaining);disp.style.color=glowColor;}
    const arc=document.getElementById("timer-arc");
    if(arc&&step.timerSec>0){
      const r=44,circ=2*Math.PI*r;
      const dash=circ*(state.remaining/step.timerSec);
      arc.setAttribute("stroke-dasharray",`${dash} ${circ}`);
      arc.setAttribute("stroke",glowColor);
    }
    const btn=document.getElementById("btn-startstop");
    if(btn){btn.style.background="linear-gradient(135deg,#690005,#93000a)";btn.style.color="#ffb4ab";}
  },1000);
}

function clearTimerInterval(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
}

// Log form helpers
function setLogField(field,val){
  state.logForm[field]=val;
  // re-render solo la done senza perdere focus su input testo
  if(field==="feeling"||field==="talkTest"){render();}
}

function saveSession(){
  const f=state.logForm;
  const isExtra=state.dayKey&&state.dayKey.startsWith("extra_");
  const entry={
    day:state.dayKey,
    date:new Date().toLocaleDateString("it-IT"),
    duration:state.workoutMins,

    hrMax:f.hrMax?Number(f.hrMax):null,
    feeling:f.feeling||null,
    talkTest:f.talkTest||null,
    notes:f.notes||"",

    partial:state.partial||false,
  };
  state.history.push(entry);

// ── AXE ACTIONS ───────────────────────────────────────────────────────────────
let axeRestInterval=null;

function axeSetReps(v){state.axe.repsPerSet=v;render();}
function axeSetRest(v){state.axe.restSec=v;render();}
function axeSetExercise(v){state.axe.exercise=v;render();}
function axeChangeTarget(delta){
  state.axe.targetSets=Math.max(4,Math.min(40,state.axe.targetSets+delta));
  const el=document.getElementById("axe-target-val");
  if(el)el.textContent=state.axe.targetSets;
}

function startAxeSession(){
  unlockAudio();
  requestWakeLock();
  clearAxeInterval();
  state.axe.phase="idle";
  state.axe.setsDone=0;
  state.axe.sessionRunning=true;
  state.axe.sessionStart=Date.now();
  state.axe.talkAsked=false;
  state.axe.talkAnswered=null;
  state.logForm={feeling:null,hrAvg:"",hrMax:"",weight:"10",talkTest:null,notes:""};
  state.tab="axe-workout";
  render();
}

function axeStartSet(){
  if(state.axe.phase==="rest")return;
  unlockAudio();
  clearAxeInterval();
  state.axe.phase="work";
  beepAxeGo();
  render();
}

function axeAbortSet(){
  clearAxeInterval();
  state.axe.phase="idle";
  render();
}

function axeSetDone(){
  clearAxeInterval();
  state.axe.setsDone++;
  beepAxeRest();
  if(state.axe.setsDone>=state.axe.targetSets){
    beepAxeDone();
    state.axe.sessionRunning=false;
    state.tab="axe-done";
    render();
    return;
  }
  state.axe.phase="rest";
  state.axe.restRemaining=state.axe.restSec;
  render();
  axeRestInterval=setInterval(()=>{
    state.axe.restRemaining--;
    if(state.axe.restRemaining<=3&&state.axe.restRemaining>0)beepTick();
    if(state.axe.restRemaining<=0){
      clearAxeInterval();
      beepAxeGo();
      state.axe.phase="idle";
      render();
      return;
    }
    // Aggiorna solo il ring senza full re-render
    const wrap=document.querySelector(".axe-ring-wrap");
    if(wrap) wrap.innerHTML=ringHTML(state.axe.restSec,state.axe.restRemaining,"#1565C0",state.axe.restRemaining<=3);
  },1000);
}

function axeSkipRest(){
  clearAxeInterval();
  state.axe.phase="idle";
  render();
}

function axeFinishSession(){
  clearAxeInterval();
  releaseWakeLock();
  state.axe.sessionRunning=false;
  state.tab="axe-done";
  render();
}

function axeTalkAnswer(val){
  state.axe.talkAnswered=val;
  state.logForm.talkTest=val;
  if(val==="fail"){
    if(confirm("Test del parlato fallito — segnale di stop AGT.\nConsigli di terminare la sessione?")){
      axeFinishSession();
      return;
    }
  }
  render();
}

function clearAxeInterval(){
  if(axeRestInterval){clearInterval(axeRestInterval);axeRestInterval=null;}
}

function saveAxeSession(){
  const ax=state.axe;
  const f=state.logForm;
  const mins=ax.sessionStart?Math.round((Date.now()-ax.sessionStart)/60000):0;
  const entry={
    date:new Date().toLocaleDateString("it-IT"),
    sets:ax.setsDone,
    reps:ax.repsPerSet,
    restSec:ax.restSec,
    weight:f.weight||"10",
    hrAvg:f.hrAvg?Number(f.hrAvg):null,
    hrMax:f.hrMax?Number(f.hrMax):null,
    feeling:f.feeling||null,
    talkTest:ax.talkAnswered||null,
    duration:mins,
  };
  state.axeHistory.push(entry);
  saveAxeHistory();
  // Aggiorna progressione
  const pr=state.axeProgress;
  if(ax.setsDone>pr.currentSets)pr.currentSets=ax.setsDone;
  if(pr.currentSets>=30&&pr.phase==="fase 1"){
    pr.phase="fase 2";pr.currentSets=0;pr.repsPerSet=6;
    showToast("🎉 Fase 1 completata! Ora 6 reps/set","ok");
  } else if(pr.currentSets>=30&&pr.phase==="fase 2"){
    pr.phase="fase 3";pr.currentSets=0;pr.repsPerSet=4;
    showToast("💪 Fase 2 completata! Aumenta il peso KB","ok");
  }
  saveAxeProgress();
  state.tab="train";
  state.trainSubTab="axe";
  render();
}

function stopWorkoutEarly(){

  state.timerRunning=false;
  state.workoutMins=Math.round((Date.now()-state.startTime)/60000);

// ── EXPORT / IMPORT ──────────────────────────────────────────────────────────
function exportJSON(){
  const data={
    version:2,
    exportedAt:new Date().toISOString(),
    history:state.history,
    axeHistory:state.axeHistory,
    axeProgress:state.axeProgress,
    activeProgram:state.activeProgram,
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`kettlebell-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function exportCSV(){
  const headers=["Data","Giorno","Durata (min)","Parziale","Peso KB (kg)","HR Media","HR Max","Sensazione","Talk Test","Warm-up","Note"];
  const rows=state.history.map(h=>[
    h.date,
    h.day,
    h.duration||"",
    h.partial?"Si":"No",
    h.weight||"",
    h.hrAvg||"",
    h.hrMax||"",
    h.feeling||"",
    h.talkTest||"",
    (h.warmup||[]).join(" | "),
    h.notes||""
  ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(","));
  const csv=[headers.join(","),...rows].join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`kettlebell-sessioni-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(){
  const input=document.createElement("input");
  input.type="file";
  input.accept=".json";
  input.onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.history)throw new Error("File non valido");
        const merge=confirm(
          `Trovate ${data.history.length} sessioni.\n\nTOCCA OK per UNIRE con i dati attuali.\nTOCCA ANNULLA per SOSTITUIRE tutto.`
        );
        if(merge){
          // Unisce evitando duplicati per data+giorno
          const existing=new Set(state.history.map(h=>h.date+"_"+h.day));
          const newEntries=data.history.filter(h=>!existing.has(h.date+"_"+h.day));
          state.history=[...state.history,...newEntries];
        } else {
          state.history=data.history;
          if(data.axeHistory)state.axeHistory=data.axeHistory;
          if(data.axeProgress)state.axeProgress=data.axeProgress;
          if(data.activeProgram)state.activeProgram=data.activeProgram;
        }
        saveHistory();
        localStorage.setItem("kb-axe-history",JSON.stringify(state.axeHistory));
        localStorage.setItem("kb-axe-progress",JSON.stringify(state.axeProgress));
        if(state.activeProgram)localStorage.setItem("kb-active-program",JSON.stringify(state.activeProgram));
        showToast(`✅ Import completato — ${state.history.length} sessioni`,"ok");
        render();
      }catch(err){
        showToast("❌ Errore nel file: "+err.message,"err");
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function activateProgram(type,id){
  const prog=type==="micro"
    ?MICROCYCLES.find(m=>m.id===id)
    :MACROCYCLES.find(m=>m.id===id);
  if(!prog)return;
  state.activeProgram={...prog,type};
  saveActiveProgram();
  render();
  const hint=document.getElementById('sound-hint');
  if(hint){
    hint.textContent=`✅ "${prog.title}" attivato`;
    hint.classList.add('show');
    setTimeout(()=>{hint.classList.remove('show');hint.textContent='🔊 Tocca Start per attivare l\'audio';},2500);
  }
}

function deactivateProgram(){
  state.activeProgram=null;
  saveActiveProgram();
  render();
}

render();
